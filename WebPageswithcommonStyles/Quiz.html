<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Networks - Timed Challenge</title>
    <link rel="stylesheet" href="Style.css">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f4f7f6; }
        .quiz-card { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Timer Styles */
        #timer-container { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; margin: 20px 0; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #48bb78; transition: width 1s linear, background-color 0.3s; }
        #timer-text { font-weight: bold; color: #4a5568; float: right; margin-bottom: 5px; }

        .option-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin: 10px 0;
            background: #fff;
            border: 2px solid #edf2f7;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-item:hover { border-color: #cbd5e0; background: #f7fafc; }
        .option-item input { margin-right: 15px; transform: scale(1.2); cursor: pointer; }
        
        /* Feedback Classes */
        .correct-row { background: #c6f6d5 !important; border-color: #38a169 !important; color: #22543d; }
        .wrong-row { background: #fed7d7 !important; border-color: #e53e3e !important; color: #822727; }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: inline-block;
        }
        #submit-btn { background: #3182ce; color: white; }
        #next-btn { background: #2d3748; color: white; }
        #restart-btn { background: #718096; color: white; margin-top: 20px; }
        .btn:disabled { background: #cbd5e0; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div style="overflow: hidden;">
        <span id="question-count" style="color: #718096; font-size: 0.9em;">Question 1 of 5</span>
        <span id="timer-text">00:30</span>
    </div>
    
    <div id="timer-container">
        <div id="timer-bar"></div>
    </div>

    <h3 id="question-text">Loading your challenge...</h3>
    <div id="options-container"></div>
    
    <div id="quiz-controls" style="margin-top: 30px; text-align: right;">
        <button id="submit-btn" class="btn" onclick="handleSubmit()">Submit Answer</button>
        <button id="next-btn" class="btn" onclick="loadNextQuestion()" style="display:none;">Next Question</button>
    </div>
    
    <div id="score-section" style="display:none; text-align: center;">
        <h2 id="final-score-text"></h2>
        <button id="restart-btn" class="btn" onclick="startQuiz()">Try Again</button>
    </div>
</div>

<script>
let allQuestions = [];
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let timer;
let timeLeft = 30;

async function startQuiz() {
    try {
        const response = await fetch('questions.json');
        allQuestions = await response.json();
        
        // Randomize questions
        currentQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 5);
        
        currentIndex = 0;
        score = 0;
        document.getElementById('score-section').style.display = 'none';
        document.getElementById('quiz-controls').style.display = 'block';
        showQuestion();
    } catch (error) {
        document.getElementById('question-text').innerText = "System Error: Ensure questions.json is available via local server.";
    }
}

function showQuestion() {
    const q = currentQuestions[currentIndex];
    document.getElementById('question-count').innerText = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
    document.getElementById('question-text').innerText = q.question;
    
    const optionsDiv = document.getElementById('options-container');
    optionsDiv.innerHTML = '';

    q.options.forEach(option => {
        const label = document.createElement('label');
        label.className = 'option-item';
        label.innerHTML = `
            <input type="radio" name="quiz-option" value="${option}">
            <span>${option}</span>
        `;
        optionsDiv.appendChild(label);
    });

    resetTimer();
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('next-btn').style.display = 'none';
}

function resetTimer() {
    clearInterval(timer);
    timeLeft = 30;
    updateTimerUI();
    
    timer = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 0) {
            clearInterval(timer);
            autoSubmit();
        }
    }, 1000);
}

function updateTimerUI() {
    const timerBar = document.getElementById('timer-bar');
    const timerText = document.getElementById('timer-text');
    const percentage = (timeLeft / 30) * 100;
    
    timerBar.style.width = percentage + "%";
    timerText.innerText = `00:${timeLeft < 10 ? '0' + timeLeft : timeLeft}`;
    
    // Change color to red when running low
    timerBar.style.backgroundColor = timeLeft < 10 ? "#e53e3e" : "#48bb78";
}

function handleSubmit() {
    const selected = document.querySelector('input[name="quiz-option"]:checked');
    if (!selected) {
        alert("Please select an option!");
        return;
    }
    processResult(selected.value, selected.parentElement);
}

function autoSubmit() {
    // If user didn't pick anything, we just show the correct answer
    processResult(null, null);
}

function processResult(userAnswer, selectedElement) {
    clearInterval(timer);
    const correctAnswer = currentQuestions[currentIndex].answer;
    const allLabels = document.querySelectorAll('.option-item');
    
    // Disable inputs
    document.querySelectorAll('input[name="quiz-option"]').forEach(i => i.disabled = true);
    document.getElementById('submit-btn').disabled = true;

    if (userAnswer === correctAnswer) {
        selectedElement.classList.add('correct-row');
        score++;
    } else {
        if (selectedElement) selectedElement.classList.add('wrong-row');
        // Highlight correct one
        allLabels.forEach(label => {
            if (label.innerText.trim() === correctAnswer) label.classList.add('correct-row');
        });
    }

    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'inline-block';
}

function loadNextQuestion() {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
        showQuestion();
    } else {
        finishQuiz();
    }
}

function finishQuiz() {
    document.getElementById('question-text').innerText = "Challenge Complete!";
    document.getElementById('options-container').innerHTML = "";
    document.getElementById('quiz-controls').style.display = 'none';
    document.getElementById('score-section').style.display = 'block';
    document.getElementById('final-score-text').innerText = `You scored ${score} / ${currentQuestions.length}`;
}

// Initial Kickoff
startQuiz();
</script>

</body>
</html>
